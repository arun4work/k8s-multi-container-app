openapi: 3.0.0
info:
  title: Values API
  version: 1.0.0
  description: API for managing calculated values with Postgres and Redis.

paths:
  /:
    get:
      tags:
        - fib
      operationId: getHealthCheck
      summary: Health check
      responses:
        "200":
          description: Returns a greeting
          content:
            text/plain:
              schema:
                type: string
                example: "Hi"

  /api/indices/all:
    get:
      tags:
        - fib
      operationId: getAllIndices
      summary: Get all indices from Postgres
      responses:
        "200":
          description: A list of indices from the database
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    number:
                      type: integer
                      example: 5

  /api/indices/values:
    get:
      tags:
        - fib
      operationId: getAvailableIndexValues
      summary: Get current indices and values from Redis
      responses:
        "200":
          description: A map of indices and their calculated values
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
                example: { "1": "1", "2": "1", "3": "2" }

  /api/indices:
    post:
      tags:
        - fib
      operationId: calculateIndexValue
      summary: Submit a new index
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                index:
                  type: string
                  description: The index to calculate
                  example: "5"
      responses:
        "200":
          description: Successful submission
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Successful"
        "422":
          description: Index too high
          content:
            text/plain:
              schema:
                type: string
                example: "Index too high"
